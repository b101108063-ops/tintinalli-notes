    <div id="search-database" style="display: none;"><div data-title="院前救護" 
                 data-permalink="http://localhost:1313/tintinalli/section_01_prehospital_care_%E6%95%B4%E7%90%86/"
                 data-content="Section 01：院前救護 EMS 歷史 1966：「Accidental Death and Disability」報告指出創傷院前處置不足 1966：National Highway Safety Act → DOT 成為全國 EMS 主管機關 1967：J.F. Pantridge 在 Belfast 開始行動 coronary care unit 1972：FCC 建議採用 9-1-1 為全國緊急電話號碼 1973：EMS Systems Act → 聯邦補助建立 ~300 個 EMS 區域系統 1981：Omnibus Budget Reconciliation Act 取消直接聯邦資助 1981：改為州 block grants → funding 下降 1986：EMTALA → 須先篩檢、先穩定患者 1990：Utstein Style 發布 → 心臟停止資料報告標準化 2011：ABEM 承認 EMS 為第 7 個次專科 EMS 15 項關鍵要素 Manpower：四級人員制度 Training：初始訓練 &#43; 繼續教育 Communications：9-1-1、PSAP、通信備援 Transportation：BLS vs. ALS 救護車 Facilities：創傷/燒傷/Stroke/心臟專科醫院、Bypass 政策 Critical-care units：加護病房、ED 壅塞、Offload time 延長 Public safety agencies：與警消合作、AED 計畫改善 OHCA 預後 Consumer participation：公眾參與政策、志願服務 Access to care：城鄉 response time 差異 Patient transfer：EMTALA 合規、預先建立 transfer agreements Coordinated patient record：電子病歷標準化、符合 HIPAA Public information/education：正確使用 9-1-1、CPR/First aid 推廣 Review and evaluation：CQI 計畫、例行稽核 Disaster plan：Written policies、儲備物資、區域演訓 Mutual aid：跨轄區互助協議 人員分級 層級 職責 EMR CPR、脊柱固定、止血、AED EMT 氧氣、CPR、止血、固定、運輸；可給自身藥物 Advanced EMT IV 置入、esophageal-tracheal airway、某些藥物 Paramedic 12 導程心電圖、手動除顫、進階氣道、心臟節律判讀 通訊系統 VHF：~170 MHz UHF：~460 MHz 800 MHz：公共安全頻段 FCC：Channel spacing 25 kHz → 12.5 kHz → 6.25 kHz Trunking：都市系統，中央處理器管理通訊路徑 800-MHz digital trunked system：EMS/警/消跨單位共享 Cellular/PCS：便宜易用；災難時可能同時故障 救護車類型 類型 特色 Type I 標準卡車底盤 &#43; 獨立 modular box；駕駛艙與後車艙分開 Type II 加大箱型車；兩艙相通 Type III 箱型底盤 &#43; 後方一體式 modular box；兩艙相通 PPE（個人防護裝備） 標準：口罩、護目鏡、手套 HazMat/生化恐攻：HEPA 口罩過濾 99.97% ≥0.3 μm 顆粒 &#43; 護目鏡 &#43; 手套 &#43; 不吸水防穿刺防護服 去顫器 AED（自動體外電擊器） BLS 服務標配 適應症：VF、&gt;180 bpm wide complex tachycardia 無螢幕顯示心律（避免非 ALS 人員分心） 公眾普及：用於第一線 response 人員及公眾場所 ALS 手動監護/去顫器 採用 adhesive pads（非 handheld paddles） 附加功能：12 導程心電圖、external pacing、synchronized cardioversion、NIBP、SpO2、EtCO2 雙相波（biphasic）：較低能量去顫、減少心肌傷害 氣道與通氣 基本氣道 OPA：oropharyngeal airway NPA：nasopharyngeal airway BVM：bag-valve mask；建議雙人操作 Supraglottic Airways（BLS level） PtL®：昏迷、&gt;14 歲、&gt;48 吋；氣囊密封食道防吸入 Combitube®：昏迷、&gt;14 歲、&gt;48 吋；氣囊堅固 King LTS-D®：成人&#43;兒童；有 gastric decompression port LMA®：成人&#43;兒童；無法確認防止吸入 不建議：Esophageal obturator airway（併發症率過高） 氣管內插管（ETI） Gold Standard for airway management 基本 EMT 成功率低、技能難以維持 建議保留為 ALS 技能 CPAP / BiPAP CPAP：維持整個呼吸週期的正壓 BiPAP：分吸氣/呼氣相 脊髓固定 C-spine Clearance（全部滿足才可臨床清除） 無頸部疼痛、壓痛、不適 年齡 11–65 歲 無意識障礙 無中毒 無分散注意力的受傷 長/短背板 硬塑膠或木頭 固定整條脊椎 短背板變種：KED（Kendrick Extrication Device） 頸圈 雙片式：Philadelphia®、Miami J®、Stifneck® 單片折疊式：Nec Loc® 單獨使用不足；需搭配背板 &#43; 頭部固定 軟頸圈：不適合院前使用 脊髓固定順序 現場穩定呼吸/循環 坐姿：短背板 &#43; 頸圈 or KED 移出車外 → 換長背板 緊急情況：僅頸圈，快速移出 全程維持手動頸椎穩定 成人：頭下墊 padding 兒童：身下墊 padding（維持中性頸椎位置） 到院後應盡快臨床/影像評估 頭盔移除原則 美式足球 Face mask：儘早移除 Helmet &#43; shoulder pads：院前不拆除（維持中立脊椎位置） 醫院內臨床評估、影像完成後再同步移除 摩托車 維持 inline immobilization 鬆開 D-ring 束帶 第二救援者以手維持 jaw/occiput pressure 撐開頭盔離開耳朵 頭盔向後上方滑出（避免傷及鼻子） 牵引夾板 類型 支撐位置 Hare® 坐骨結節 Sager® 恥骨聯合 適應症：股骨骨折（固定減少出血、軟組織損傷） 禁忌：骨盆骨折、近膝關節骨折、開放性骨折、神經血管損傷、髖關節脫臼 血管內 접근 ALS 救護車：建立 IV（輸液 &#43; 給藥） 創傷患者：固定後於轉送中進行 IV 低血容量創傷：aggressive fluid resuscitation 可能增加出血和死亡率 IO（骨內針）：困難建立 IV 時的重要替代 院前超聲（POCUS） 美國、歐洲均證實可行 歐洲系統多由醫師執業 美國逐漸有 paramedic/nurse 操作數據 重點摘要 EMS 發展：1966 現代化 → 1973 系統化 → 1981 funding 下降 → 2011 次專科化 四級人員：EMR → EMT → Advanced EMT → Paramedic AED：BLS 標配； shock VF、&gt;180 bpm ALS 去顫器：biphasic、adhesive pads、12 導程心電圖 C-spine clearance：無疼痛、年齡 11-65、無 altered sensorium、無 intoxication、無 distracting injury Traction splint：Hare®/Sager®；禁忌：骨盆骨折、近膝關節 EMTALA（1986）：先篩檢、先穩定、接收醫院同意才能轉院 "></div><div data-title="災害管理" 
                 data-permalink="http://localhost:1313/tintinalli/section_02_disaster_%E6%95%B4%E7%90%86/"
                 data-content="Section 02：災害管理 災害分類 類型 範例 Natural disaster Earthquake, tsunami, hurricane, pandemic Man-made disaster 車禍、爆炸、工業事故、化學洩漏 Terrorist-related 化學、生物、輻射、核能、爆炸性（CBRNE） Internal disaster 院內 Hazmat、火災、停电 External disaster 交通事故、工業事故 災害特性 急性災害：患者通常在無 prehospital triage 情況下自行到最近醫院 初始患者在數分鐘內到達；巔峰量在事發後 2-3 小時 ~80% 患者非由 prehospital 運輸，而是自行前往 醫院應變計畫（Hospital Emergency Operations Plan） Joint Commission 要求每年演訓 2 次 需涵蓋：hazard vulnerability analysis、法規合規、社區協調、國家資源整合 96 小時 supply 自主維持 國家資源整合 單位 功能 NDMS 提供 surge capacity DMAT 部署至 federally declared disasters DMORT 處理大量死亡 SNS 12h內 delivery（prepackaged cache） CDC Bioterrorism advisory lead FBI Crisis management lead 去污（Decontamination） 在 ED 外部執行 Hospital personnel 需要 Level C PPE 每 30 分鐘 更換 personnel 標準程序：脫衣、刷掉粉塵、洗臉烘乾、Warm water 沖洗 5 分鐘 分流（Triage） START 分流 評估：呼吸、循環、hemorrhage control、mental status 分流類別 顏色 優先 說明 Red 第一優先 立即危及生命但可搶救 Yellow 第二優先 有系統影響但尚無生命危險 Green 第三優先 局部傷病；數小時內不太會惡化 Black 死亡/expectant 無法搶救或即使照顧也幾乎無存活希望 天然災害後常見疾病 類別 說明 創傷 急性期（建築物倒塌）、清理期（不安全設施） 呼吸道 &lt;5 歲兒童死亡原因 &lt;5% 腸道疾病 急性期後 ~40% 死亡（80% 為兒童） 皮膚/軟組織 Vibrio vulnificus（水災）可能危及生命/肢體 慢性病惡化 &gt;25% 病患有慢性病 心理健康 PTSD 可達 expected population 的 10 倍 天然災害處置要點 手術能力：mobile blood banks、每手術 2 units blood 疫苗：pertussis/measles 可預防 心理衛生：需 resources for survivors、children、first responders 遺體處理：corpse 不太傳播傳染病；標準 universal precautions 化學/生物災害 CBRNE：化學、生物、放射性、核能、爆炸性 三大生物威脅：Anthrax、Smallpox、Plague 需特殊 PPE（Level A/B）、去污設施、antidotes 立即通知 public health agency 重點摘要 ~80% 災害患者自行前往（不靠 prehospital） The Joint Commission：每年演訓 2 次 SNS：12h內 delivery Triage：Red（立即）、Yellow（可等45-60min）、Green（數小時）、Black（expectant） 天然災害後：PTSD 可達 10 倍；腸道疾病導致急性期後 40% 死亡 三大生物威脅：Anthrax、Smallpox、Plague "></div><div data-title="復甦"

                 data-content="Section 03：復甦 Sudden Cardiac Death 流行病學 美國每年約 382,800 成人發生 out-of-hospital cardiac arrest EMS-treated survival：11.4%；overall survival：6.8% 80% 發生於家中；公共場所存活率較高（VF 發生率較高） 最低社會經濟階層 SCD 發生率高 30-80% 死亡高峰：醒後數小時（交感神經刺激增加） 兩年齡高峰：嬰兒期（SIDS）、&gt;45-50 歲（60% 為男性） 病因 病因 比例 冠狀動脈疾病（常為未診斷） 80% 心肌病變 10-15% 其他（channelopathies、瓣膜疾病、先天異常） 5-10% 冠狀動脈疾病：80% 驗屍發現 atherosclerosis；70-80% coronary angiography 發現；1/3 有 acute plaque rupture 嚴重左心室功能障礙：EF ≤35% 為 ICD 主要候選 心肌病變：LV 擴張 → 去極化/復極化分散 → circus movement reentry → VT/VF 肥厚性心肌病（HCM）：年輕運動員最常見心血管死因（1/3）；每年 SCD risk ~1%/year ARVC：遺傳性右心病變；T-wave inversion in V1-3；ICD 為首選 先天性心臟病相關 SCD 左心阻塞性病變（主動脈瓣狹窄、主動脈窄縮）、發紺型缺損（Fallot 四重症、Ebstein’s anomaly） 最大風險在運動時；50% 由 VF 造成 Hereditary Channelopathies 疾病 ECG 特徵 風險 Brugada syndrome V1-3 downsloping ST elevation &#43; RBBB pattern 40-60% life-threatening VA；常見於東南亞 Early repolarization J wave &#43; upsloping ST elevation（lateral/inferior） 通常良性；&gt;1%成人；運動員可達10% Long QT syndrome QTc 延長 Torsade de pointes → VF；Bazett formula：QTc = QTm/√RR Short QT syndrome QTc &lt;0.34s AF、VT/VF、SCD CPVT 正常（運動/stress 誘發） 50% initially diagnosed as epilepsy 休克類型 類型 特色 Hypovolemic 出血、脫水；冷、濕、蒼白；CVP 低 Cardiogenic 心臟功能障礙；冷、濕；CVP 高；心臟衰竭證據 Obstructive PE、心包填塞、張力性氣胸；冷、濕；CVP 高 Distributive（Septic） 暖、低外週阻力；晚期冰冷；CVP 低 Neurogenic 創傷性脊髓損傷；溫暖、乾；心動過緩 休克評估與處理 MAP = CO × SVR；目標 MAP &gt;65 mmHg 乳酸：&gt;2 mmol/L 為組織灌流不足；目標 &lt;2 ScvO2（central venous O2 saturation）：&gt;70% 尿量：&gt;0.5 mL/kg/hr Fluid resuscitation：crystalloid（lactated Ringer’s 或 normal saline） Vasopressors：Norepinephrine（首選）、Dopamine、Epinephrine Inotropes：Dobutamine（增加 CO）、Milrinone（PDE-3 inhibitor） VA-ECMO：難復甦心因性休克 創傷性休克復甦 TASH score（Trauma Associated Severe Hemorrhage）：預測 massive transfusion MTP（Massive Transfusion Protocol）：1:1:1（PRBC:FFP:Platelet） Tranexamic acid（TXA）：&lt;3h 內 1g IV（第一小時）&#43; 1g（接下來 8h） Permissive hypotension：目標 SBP 80-90 mmHg（無頭部創傷） REBOA（Resuscitative Endovascular Balloon Occlusion of the Aorta）：用於不可壓迫出血 目標：控制出血 → 維持組織灌流 → 防止低體溫/酸中毒/凝血病變三角 過敏性反應（Anaphylaxis） 診斷標準（NIAID）：3 個器官系統 involve 或已知 allergen exposure &#43; 2 個系統 皮膚症狀（90%）：蕁麻疹、血管性水腫、紅斑 呼吸（70%）：支氣管痙攣、喉頭水腫、喘鳴 心血管（45%）：低血壓、心搏過速、血管崩潰 GI（30%）：腹痛、嘔吐、腹瀉 過敏性反應治療 Epinephrine（IM）：1:1000，0.3-0.5 mg（成人）；0.01 mg/kg（兒童，max 0.3 mg） 位置：大腿外側（可重複每 5-15 分鐘） IV fluids：2-4 L crystalloid Antihistamines：Diphenhydramine 25-50 mg IV &#43; Famotidine 20 mg IV Corticosteroids：Methylprednisolone 125 mg IV 或 Dexamethasone 10 mg IV Glucagon：1-5 mg IV（beta-blocker 患者） Albuterol：2.5-5 mg nebulized（持續支氣管痙攣） Norepinephrine：若持續低血壓（加強血管收縮） 酸鹼失衡 失衡 原因 特色 MA（ Metabolic acidosis） 乳酸（組織灌流不足）、 ketones、renal failure、toxins HCO3 下降；Pco2 代償性下降 MAl（Metabolic alkalosis） 嘔吐、胃吸引、diuretics、鹼過量 HCO3 上升 RA（Respiratory acidosis） 呼吸抑制、COPD 急性惡化、氣道阻塞 Pco2 上升；HCO3 代償性上升 RAl（Respiratory alkalosis） 焦慮、過度換氣、發燒、藥物、肺栓塞 Pco2 下降 補償公式 MA：預期 Pco2 = 1.5 × HCO3 &#43; 8（±2） MAl：預期 HCO3 上升 10 = Pco2 上升 5-7 mmHg RA：急性：HCO3 上升 1 = Pco2 上升 1；慢性：HCO3 上升 10 = Pco2 上升 7 RAl：急性：HCO3 下降 2 = Pco2 下降 5；慢性：HCO3 下降 5 = Pco2 下降 10 血氣分析判讀步驟 看 pH：&lt;7.35 酸中毒；&gt;7.45 鹼中毒 看 Pco2 vs HCO3：哪個與 pH 方向一致（primary disorder） 計算補償是否適當 判斷是否為單純或混合失衡 計算 Anion gap = Na - (Cl &#43; HCO3)；正常 8-12 高陰離子隙 MA：Lactic acidosis、ketoacidosis、toxins（methanol、uremia、propylene glycol、 metformin） 正常陰離子隙 MA（MUDPIES）：慢性腎病、Addison’s、dilutional、GI loss、輸入大量 saline、renal tubular acidosis 液體與電解質 項目 正常值 異常及時處置 Na 136-145 mEq/L &lt;120：Hypertonic saline；&gt;160：Free water K 3.5-5.0 mEq/L &lt;2.5：KCl；&gt;6.5：Calcium、insulin/glucose、albuterol、Kayexalate Ca（total） 8.5-10.5 mg/dL 低：MgSO4、CaCl2；心臟手術後監測 Mg 1.5-2.5 mg/dL &lt;1.5：替補；心臟手術後、Torsades、TOCS 警訊 Phosphate 2.5-4.5 mg/dL 低：rebound after starvation、TPN 心律不整 類型 特色 VT（Ventricular tachycardia） ≥3 consecutive PVCs；QRS &gt;0.12s；穩定 vs. 不穩定 VF（Ventricular fibrillation） 無效心室收縮；需立即除顫 Asystole 完全無心臟活動；很少存活 PEA（Pulseless electrical activity） 有節律但無脈搏；需找出可逆原因 SVT &gt;150 bpm；SVT with aberrancy vs. VT 鑑別重要 抗心律不整藥物 藥物 劑量 適應症 Adenosine 6mg → 12mg（第二劑） SVT diagnosis/終止；AV node reentrant Amiodarone 150mg IV（10min）→ 1mg/min VT/VF、VF；wide-complex tachycardia Lidocaine 1-1.5 mg/kg IV VT/VF（第二線）；窄-complex SVT Procainamide 20-50 mg/min IV SVT、VT、WPW；QRS 增寬 &gt;50% 需停藥 Esmolol 5-100 mcg/kg/min SVT、高血壓、aortic dissection Verapamil/Diltiazem V: 5-10mg IV；D: 15-20mg/hr SVT、AF with RVR Atropine 0.5 mg IV（可重複，最大 3mg） Sympathetic/bradycardia、PEA with bradycardia 電擊整流（Cardioversion）與除顫 情境 能量 同步電擊（Synchronized cardioversion） SVT/AF：100-200 J（biphasic）；VT（稳定）：100 J VF/無脈搏 VT 120-200 J（biphasic）；360 J（monophasic） PEA/Asystole 無法電擊；專注 CPR &#43; Epinephrine 升壓與強心藥物 藥物 劑量 作用 Norepinephrine 0.05-0.5 mcg/kg/min α1&#43;β1：強血管收縮（升血壓首選） Epinephrine 0.01-0.5 mcg/kg/min β1&#43;β2&#43;α1：心臟復甦、CPR、過敏 Dopamine 2-20 mcg/kg/min 低劑量：D1；中劑量：β1；高劑量：α1 Dobutamine 2-20 mcg/kg/min β1&gt;β2：增加心肌收縮力（心因性休克） Milrinone 0.375-0.75 mcg/kg/min PDE-3 inhibitor：增加 cAMP；心因性休克、PAH Vasopressin 0.03-0.04 units/min V1：純血管收縮；不受 β-blocker 影響 Dobutamine 2-20 mcg/kg/min β1&gt;β2：強心（心因性休克） Nitroglycerin 5-200 mcg/min Venous dilator；ACS、Hypertensive emergency Nitroprusside 0.3-10 mcg/kg/min 動靜脈均衡擴張；主動脈剝離、高血壓急症 高壓氧治療（Hyperbaric Oxygen Therapy） 適應症 機制 CO 中毒 加速 CO-Hb 解離；縮短半衰期 氣壓傷/減壓病 減少氣泡體積；改善組織缺氧 壞死性軟組織感染 提高組織氧分壓；抑制厭氧菌 放射組織損傷 促進血管新生 傷口癒合延遲 刺激血管新生 重點摘要 SCD 病因：80% 冠狀動脈疾病；EF ≤35% 為 ICD 候選 Brugada syndrome：V1-3 ST elevation &#43; RBBB pattern；東南亞常見 Long QT syndrome：QTc &gt;0.44s（心率 60）；Torsades de pointes Shock 類型：Hypovolemic / Cardiogenic / Obstructive / Distributive / Neurogenic 目標：MAP &gt;65 mmHg；Lactate &lt;2 mmol/L；尿量 &gt;0.5 mL/kg/hr 創傷大量輸血：1:1:1（PRBC:FFP:Platelet）；TXA &lt;3h；Permissive hypotension 過敏性反應：IM Epinephrine 0.3-0.5 mg（大腿外側） 酸鹼失衡：補償公式判讀；Anion gap 高 MA（MUDPILES）/正常（MUDPIES） 電擊能量：VF 120-200J（biphasic）；同步 cardioversion 100-200J 首選升壓：Norepinephrine（α1&#43;β1） 心因性休克強心：Dobutamine "></div><div data-title="復甦處置"

                 data-content="Section 04：復甦處置 Basic Cardiopulmonary Resuscitation CPR 目的 暫時提供 vital organs（brain、heart）有效 oxygenation 直到恢复正常心肺功能 AHA Chain of Survival Immediate recognition / Early access：撥打 911 Early CPR：旁觀者 CPR 可使 VF survival 加倍/-triple Early defibrillation：3-5 min 內 CPR &#43; 去顫 → survival 可達 49-75% Early advanced care：由醫療人員提供 Postarrest care：高品質整合照護 2010 AHA 指南更新 「看、聽、感覺」從演算法移除 → 立即開始高品質 CPR Lone rescuer：從 ABC 改為 CAB Compression rate：至少 100/min（非大約 100） Compression depth：至少 5 cm（2 inches）（非 1½-2 inches） 未受訓旁觀者：僅胸部按壓，「用力快速」按壓胸骨中央 Pulse check：最多 10 秒；EtCO2 可替代 pulse check 訓練有素的救援者：Cricoid pressure 不再建議 Postresuscitation care（含 therapeutic hypothermia）被強調 CPR 步驟 步驟 內容 Step 1 評估：無反應、無呼吸或異常呼吸/嘆息 Step 2 致電 911 &#43; 取得 AED；若為窒息（如溺水）先 CPR 5 cycles Step 3（僅醫療人員） 評估脈搏：最多 10 秒 Step 4 30:2 按壓:呼吸；按壓「用力快速」；允許完全回彈；最小化中斷 Step 5 使用 defibrillator：未目擊 arrest 先給 5 cycles CPR；AED 可立即使用 Step 6 救援呼吸：每口 1 秒；可見胸部上升；8-10 次/分鐘（插管患者） Closed Chest Compression 技術 Depth：至少 5 cm（2 in.） Rate：至少 100/min 壓迫/放鬆時間約相等 最小化中断 手臂伸直、肘部鎖定 力量從肩膀垂直向下 Ventilation 未插管：30:2（單人或雙人） 插管：8-10 次/分鐘，不暫停胸部按壓 Tidal volume：6-7 mL/kg（足以可見胸部上升） 避免快速/用力呼吸、避免過度通氣 Open Chest Cardiac Massage（開胸心臟按摩） 適應症：穿透性胸部創傷、心臟手術前後、低溫、PE、心包填塞、腹腔出血、胸部變形無效 優於 Closed chest CPR（動物模型） 需要多學科團隊 CPR 併發症 胃脹氣 → 逆流吸入 → 吸入性肺炎 肋骨/胸骨骨折、肋軟骨分離 肺部挫傷、氣胸、心肌挫傷、心包積血 脾/肝裂傷 晚期：肺水腫、GI 出血、肺炎、復發性心肺停止 缺氧性腦損傷：復甦患者最常見死亡原因 呼吸道暢通手法 Head Tilt–Chin Lift 一手托頸、一手壓前額 將頭置於「嗅聞位置」 另一手托下頜提起 Jaw Thrust 懷疑頸椎損傷時最安全 維持頸椎 neutral position 從患者頭側雙手抓住下頜角，向前提起 異物阻塞氣道（Foreign Body Obstruction） 部分阻塞：可說話、咳嗽 → 鼓勵自發排出；不干擾 嚴重部分/完全阻塞：無法說話、呼吸困難、喘鳴、發紺 → 立即處理 Heimlich Maneuver（腹部衝擊） 清醒患者：站/坐姿 握拳置於肚臍上方、劍突下方 快速向上向內推壓 意識不清患者：仰臥 跨坐大腿 雙手置於肚臥上方，快速向上推壓 可重複直至異物排出或意識不清 自助：用自己的拳頭或靠在固定物體上 Chest Thrusts（胸部衝擊） 適用：病態肥胖、晚期懷孕（無法腹部衝擊） 清醒：握拳置於胸骨（避開劍突、肋緣） 意識不清：置於 standard chest compression 位置 Finger Sweep 不再建議 blind finger sweep 僅在可見異物時使用 Defibrillation and Cardioversion 去顫（Defibrillation） VF/pulseless VT：第一優先（與 CPR 同時） 早期去顫是 OHCA 存活的最重要因素 Waveform：建議 biphasic（能量較低、效果較好） Biphasic 能量：120-200 J Monophasic 能量：360 J 若 initial shock 失敗：增加能量後再次 shock CPR 5 cycles（~2 min）後可再嘗試去顫 同步電擊（Synchronized Cardioversion） 情境 能量 SVT 100-200 J（bipasic） AF 100-200 J（biphasic） Stable VT 100 J AT/Flutter 50-100 J 使用於有脈搏的 unstable tachyarrhythmia 意識清醒患者：Sedation &#43; Analgesia 同步模式：避開 T wave（以免誘發 VF） 公眾場所去顫（Public Access Defibrillation） PAD 隨機臨床試驗：受訓路人使用 AED 使存活至出院率加倍 建議：AED 存放於心臟驟停高風險區（機場、體育館等） Advanced Cardiac Life Support ACLS 演算法 VF / Pulseless VT CPR &#43; 去顫（單手操作者：先 CPR 2 min 再去顫） Epinephrine 1 mg IV（每 3-5 min 重複） Amiodarone 300 mg IV（第一劑）；150 mg（第二劑） 若為 refractory VF：考慮 Lidocaine 1-1.5 mg/kg 解決可逆原因（Hs/Ts） Asystole / PEA CPR Epinephrine 1 mg IV（每 3-5 min） Atropine 0.5 mg IV（每 3-5 min，最大 3 mg）- 用於 symptomatic bradycardia、PEA with bradycardia 考慮 pacing（transcutaneous → transvenous） 解決可逆原因 Hs and Ts（可逆原因） H T Hypoxia Tension pneumothorax Hypovolemia Tamponade（心包） Hypothermia Toxins Hyperkalemia Thrombosis（PE/MI） Hydrogen ion（acidosis） Trauma 藥物 藥物 劑量 適應症 Epinephrine 1 mg IV（q3-5min） VF/PEA/Asystole、心臟停止 Vasopressin 40 units IV（單劑） VF/PEA（替代第一劑 Epinephrine） Atropine 0.5 mg IV（q3-5min，max 3 mg） Sympathetic bradycardia、PEA with brady Amiodarone 300 mg IV → 150 mg IV VF/pVT、wide-complex tachycardia Lidocaine 1-1.5 mg/kg IV VF/pVT（第二線） Adenosine 6 mg rapid IV → 12 mg（第二劑） SVT diagnosis/終止 Magnesium 1-2 g IV Torsades de pointes、低鎂血症 Pregnancy in Cardiac Arrest 獨特考量 孕婦心臟停止：左側卧位（手動或楔形墊）或手動左子位（減少對下腔靜脈的壓迫） 妊娠中期/後期：考慮立即性剖腹產（C-section）以利復甦 差異 可能需要更早、更積極的干预 由於胎兒依賴母親，術後康復護理對母親和胎兒都至關重要 Post-Cardiac Arrest Syndrome 組成 腦損傷：缺氧性腦病、腦水腫、Cerebral edema 心臟功能障礙：Myocardial dysfunction、心源性休克 系統性缺血/再灌注損傷：全身性發炎反應 持續病生理：感染、腎功能衰竭、血糖控制 目標體溫管理（Targeted Temperature Management, TTM） TTM：32-36°C，持續 24 小時 2015 AHA：所有復甦後無反應患者建議 TTM 若復甦後恢復意識：考慮逐步回溫（0.25-0.5°C/hr） 避免快速回溫 Post-Cardiac Arrest Care 要點 血行動力學：維持 MAP &gt;65 mmHg 氧合：SpO2 94-99%（避免高氧） 血糖控制：140-180 mg/dL 神經學：GCSEye opening &gt;2 或追蹤 冠狀動脈造影：STEMI/NSTEMI 儘早評估 發作評估：EEG monitoring Ethics of Resuscitation 不嘗試復甦（DNAR）命令 須有書面 orders 患者意圖表達（口頭/書面 advance directive）                  data-content="Section 05：止痛與麻醉 疼痛評估 (Pain Assessment) 75-80% of ED patients present with pain as primary complaint Oligoanalgesia (疼痛治療不足) 普遍存在 高風險族群：種族少數、年老、年幼、認知障礙 疼痛治療不應因擔心成癮而省略 疼痛量表 Scale Method 特點 VAS 0-100mm linear scale 13mm = 最小顯著改變；30mm = 最小可接受改變 NRS 0-10 numeric 最常用 5-point global 0-4 descriptor 1 point 改變 = 大改變 疼痛程度分級 Mild：VAS 0-30mm, NRS 0-3/4 Moderate：VAS 40-60mm, NRS 4-6/7 Severe：VAS &gt;60mm, NRS &gt;6/7 鴉片類止痛藥 (Opioid Analgesics) First-line Opioids Drug Dose (Adult) Onset Duration Notes Morphine 0.1 mg/kg IV 1-2 min (IV) 1-2h (IV) Histamine release → hypotension/nausea 10 mg IM/SC 15-30 min (IM) 3-4h (IM/SC) 0.3 mg/kg PO 10-15 min - Hydromorphone 0.015 mg/kg IV 3-5 min 2-4h More euphoria than morphine 1-2 mg IM 7-10 min peak - Fentanyl 1 mcg/kg IV &lt;1 min 30-60 min Less CV depression; &gt;5 mcg/kg → chest wall rigidity 100 mcg nasal spray - - Breakthrough cancer pain; wait &gt;2h 100 mcg buccal tablet - - Breakthrough cancer pain; wait &gt;4h Avoid/Use Caution Drug Issue Meperidine Normeperidine accumulation → neurotoxicity; avoid in renal failure; MAOI interaction Codeine 10% patients cannot metabolize; unreliable analgesia; neonatal death risk in breastfeeding Tramadol Serotonin syndrome risk; seizure risk; CNS side effects common Equipotent Doses (IV) Morphine 10mg = Hydromorphone 1.5mg = Fentanyl 0.1mg = Meperidine 75mg Opioid Agonist-Antagonists Drug Dose Notes Buprenorphine 0.3 mg IV/IM q6h Ceiling effect on respiratory depression Nalbuphine 10-20 mg IV/IM q3-6h Butorphanol 0.5-2 mg IV q3-4h 非鴉片類止痛藥 (Nonopioid Analgesics) Drug Dose Max Daily Notes Acetaminophen 325-1000 mg PO q4-6h 3-4 g/day No platelet effect; hepatotoxic &gt;4g 1 g IV q6h (&gt;50kg) 4 g/day Aspirin 325-650 mg PO q4h 4 g/day Platelet dysfunction; GI bleeding; tinnitus = toxicity Ibuprofen 400-800 mg PO q4-6h 2.4 g/day Naproxen 250-500 mg PO q8-12h 1.25 g/day Ketorolac 30 mg IV/IM q6h 120 mg/day (60mg if &gt;65y or &lt;50kg) GI bleeding risk &gt; ibuprofen; l                  data-content="Section 06：傷口處理 Wound Evaluation Risk Assessment 感染風險因素： 老年、糖尿病、慢性腎衰竭、肥胖、營養不良 免疫抑制藥物、膠原蛋白疾病、蛋白質/維生素C缺乏 傷口特性：位置、年齡、深度、形狀、污染程度 疤痕傾向：Black 和 Asian 患者易形成 keloid Hypertrophic scar：在傷口範圍內，1-2年可能部分自行消退 Keloid：基因相關，超出原始傷口範圍，一旦形成很少縮小 過敏史：麻醉劑、抗生素、乳膠 破傷風免疫狀態：需確認 Foreign body 風險：MVC、玻璃、木頭 Foreign body sensation：成人 positive LR = 2.49，negative LR = 0.69 兒童：foreign body sensation 無參考價值 感染風險：有機/無機污染物（土壤、黏土）即使小劑量也可致病 機轉：blunt force（crush）、sharp shear、crush injuries 更易感染 Time to closure：無明確定義與感染的關係 Time to closure：需考慮病因、位置、污染程度、主觀風險、整容需求 High-risk wound：考虑延遲一期閉合（4天後） 感染風險位置 位置 風險 Head and neck 1-2% Upper extremity 較低 Lower extremity 較高 Axilla, perineum, toe webs, intertriginous areas 高（百萬 bacteria/cm²） Wound Examination 需患者配合、最佳照明、無殘餘出血 關節處需懷疑關節囊穿透 評估：neutral position &#43; injury position Chain-saw knee wounds：常發生於 knee flexed position Metacarpophalangeal joint lacerations：fight bites，應視為 human bites Tourniquet：使用不超過 30 分鐘 Imaging 大多數 foreign bodies 在 plain radiographs 可見 可見物：metal, bone, teeth, pencil graphite, certain plastics, glass, gravel, sand, some fish bones, some painted wood, aluminum CT/MRI：用於 soft tissue density 的物體 超聲：對木頭 foreign bodies 有用 超聲無法可靠排除 &lt;2.5 mm wood fragments Wound Preparation 原則 所有傷口需麻醉後檢查（見 Section 35） Systemic analgesia 或 procedural sedation 可能需要 初步沖洗最重要 Debridement：移除壞死組織、異物 Irrigation：大量生理食鹽水沖洗（pulse irrigation） 壞死組織：銳利切除（epidermis only） 尊重 Relaxed skin tension lines 避免廣泛切除 Wound Closure 縫合材料 位置 縫線 Scalp Staples 或不可吸收線 Face 6-0 nonabsorbable monofilament Eyelid 6-0 or 7-0 monofilament Intraoral 5-0 absorbable Trunk/extremity Staples 或 5-0 absorbable Joints 4-0 nonabsorbable 縫合技術 Primary closure：傷口邊緣對齊無張力 Delayed primary closure：4天後關閉 Secondary intention：開放癒合（感染傷口） Skin tension lines：平行癒合較好 真皮內縫合：減少張力、疤痕 預防性抗生素 ED 傷口感染率：2-5% 高風險位置：axilla, perineum, feet, hands（血流供應差、潮濕） 高風險機轉：crush, puncture 最重要預防：adequate irrigation &#43; debridement 大多數非咬傷感染：Staph 或 Strep MRSA 上升：β-lactam 仍足夠 抗生素療程：3-5 天（非明確療程） Human bites to hands/feet/joints：amoxicillin-clavulanate Mammalian bites to hand：amoxicillin-clavulanate Fresh water/puncture through shoes：Pseudomonas 風險，選擇涵蓋此菌的抗生素 Face and Scalp Lacerations Scalp 出血多，但感染率低（血流豐富） Hair apposition technique（不必剃頭） 顱骨骨折需排除 Sutures/staples 移除：10-14 天 Eyelid 需精確對齊（睫毛、眼皮邊緣） 6-0 or 7-0 sutures 移除：3-5 天 檢查眼球運動、視力 Auricle (Ear) Cartilage 暴露需覆蓋 Pressure dressing 24-48 小時 移除後檢查感染/血腫 Lips 精確對齊（vermilion border） 口腔內層先縫 6-0 sutures 移除：5-7 天 Intraoral 5-0 absorbable sutures Good oral hygiene 漱口 抗生素：醫師決定 Nose 精確對齊鼻翼邊緣 Intranasal packing：2 天後移除 6-0 sutures 移除：3-5 天 Eyebrow 不要剃眉毛 順著毛髮方向對齊 Cheek 評估 parotid gland/duct、facial nerve Parotid duct injury：傷口跨 tragus 到 frenulum，posterior to lateral canthus vertical line 口腔黏膜先縫合 5-0 or 6-0 percutaneous sutures Arm and Hand Lacerations Flexor Tendon Injury 需修復（surgical） 评估：FDP, FDS, EPL 功能 固定於舒適位置 整形外科consult Extensor Tendon Injury Zone 處理 I (distal) Mallet finger：splint 6-8 weeks II-IV Primary repair if &gt;50% severed V-VI Primary repair VII-VIII 手術修復 Nerve Injury 感覺測試：兩點辨別 運動：individual muscle testing 需要時外科修復 Fingertip Amputation 保留手指長度 Soft tissue coverage STSG 或 flap Subungual Hematoma Trephination（洞穿指甲） 緩解疼痛 Leg and Foot Lacerations Foot Anatomy Plantar epidermis/dermis：厚實，敏感 Heel pad：18mm 厚脂肪墊 Dorsal foot：保護少，肌腱、神經、血管易受傷 肌腱風險 Fibularis longus/brevis：lateral malleolus 處 Extensor hallucis longus：first metatarsal 背側 Achilles tendon：posterior ankle Patellar tendon：infrapatellar lacerations Quadriceps tendon：suprapatellar lacerations 神經 Posterior tibial nerve：intrinsic foot muscles Deep peroneal nerve：extensor digitorum brevis, extensor hallucis brevis Common peroneal nerve：foot drop Lower Leg/Foot Lacerations 深部結構評估 X-ray 排除 foreign body 依位置關閉（參考 wound closure 章節） Soft Tissue Foreign Bodies 評估 症狀：疼痛、異物感 Mechanism：glass, wood, metal, plastic X-ray：第一線（glass, metal, gravel 可見） 超聲：木頭、塑膠（soft tissue density） CT：複雜案例 移除原則 可觸及：直接移除 深部/無症狀：觀察 Hand/foot 深部：手術室移除 引導：fluoroscopy, ultrasound Puncture Wounds and Bites 穿刺傷 高感染風險 超聲排除 foreign body 大量沖洗 抬高患部 抗生素：diabetic foot infection 風險 Animal Bites Dog bites：Capnophagia, anaerobes Cat bites：Pasteurella Human bites：Eikenella, Streptococcus, Staphylococcus 培養 延遲閉合 Hand/foot/joints：amoxicillin-clavulanate 10-14 天 狂犬病風險評估 蛇咬傷 確認蛇種 固定患部低於心臟 抗蛇毒血清（ antivenom） 避免：切開、吸出、冰敷、止血帶 Postrepair Wound Care 傷口護理 保持傷口濕潤（antibiotic ointment 或非黏附敷料） 觀察感染跡象（紅、腫、熱、膿） 抬高患部（減少水腫） 避免過度活動 拆線時間 位置 時間 Scalp 10-14 天 Face (forehead, ear, lip) 5-7 天 Eyelid, nose 3-5 天 Trunk 7-10 天 Extremity (extensor) 10-14 天 Joint (flexor) 14-21 天 Patient Education 告知會有疤痕 Keloid 風險 傷口保護 異常跡象（感染） 重點摘要 感染風險：crush &gt; shear；低血流/潮濕區域更高 最重要預防：adequate irrigation &#43; debridement Time to closure：時間非主要因素，病因/位置/污染更重要 抗生素：高風險傷口（hand/foot/joints）才預防性使用 Face：精確對齊（vermilion border、eyelid edge） Scalp：hair apposition、staples Tendon/Nerve：需要時外科consult Bites：延遲閉合、高劑量抗生素（amoxicillin-clavulanate） 拆線時間：臉 3-7 天、躯干/關節 10-21 天 "></div><div data-title="心血管疾病"

                 data-content="Section 07：心血管疾病 Chest Pain 危及生命的胸痛病因 疾病 疼痛位置 疼痛特性 輻射 伴隨症狀 ACS Substernal, L chest Crushing, tightness, pressure R/L shoulder, arms, jaw Dyspnea, diaphoresis, nausea Pulmonary embolism Focal chest Pleuritic None Tachycardia, tachypnea, hypoxia Aortic dissection Midline, substernal Ripping, tearing Interscapular back Secondary arterial branch occlusion Pneumonia Focal chest Sharp, pleuritic None Fever, hypoxia Esophageal rupture Substernal Sudden, sharp, after vomiting Back Dyspnea, sepsis Pneumothorax One side Sudden, sharp, pleuritic Shoulder, back Dyspnea Pericarditis Substernal Sharp, constant or pleuritic Back, neck, shoulder Fever, friction rub ACS 定義 STEMI：ST 段上升心肌梗塞 NSTEMI：非ST段上升心肌梗塞 Unstable angina：新發生、頻率增加、休息時發作的胸痛（無 ST 變化或 biomarker 升高） Classic Cardiac Chest Pain 位置：substernal left anterior chest 特性：crushing, squeezing, tightness, pressure 誘發：exertion，休息緩解 持續：典型心絞痛 2-10 min；不穩定心絞痛 10-30 min；AMI &gt;30 min 輻射：arms, neck, jaw 伴隨：diaphoresis, dyspnea, nausea, vomiting Nonclassic Presentation（常見於女性、老年人、糖尿病） 22% AMI 患者描述為 sharp or stabbing 女性特殊表現：無關運動的疼痛、antiacid 緩解、palpitations、疲勞 Anginal equivalents：dyspnea、nausea、light-headedness、weakness、shoulder/arm/jaw discomfort Risk Factors Age &gt;40、male/postmenopausal female Hypertension、tobacco、hypercholesterolemia、diabetes Family history、sedentary lifestyle Cocaine：即使年輕人也會導致 AMI Physical Examination 常常正常 心音異常：S3, S4 gallop, diminished S1, paradoxically split S2 新 murmur：chordae tendineae rupture 或 aortic root dissection Crackles：ischemia-induced CHF 與 AMI 最強相關：hypotension、S3 gallop、diaphoresis ECG 目標：10 分鐘內完成 STEMI 定義：≥1 mm ST 上升 in ≥2 contiguous leads 正常 ECG：&lt;5% chest pain 患者有 STEMI Normal ECG 的 AMI miss 風險：OR 7.7 Cardiac Biomarkers Cardiac Troponin (cTn) 黃金標準：高敏感度、近乎完全心臟特異性 升高不等於 AMI：需結合臨床情境 升高時機：症狀發作後 2 小時可偵測，6 小時以上才可靠 高峰期：約 48 小時 持續時間：可達 10 天 非缺血性升高原因： Cardiac contusion/procedures CHF, aortic dissection/valve disease Hypertrophic cardiomyopathy Arrhythmias, Takotsubo PE, pulmonary hypertension Stroke, SAH Myocarditis, endocarditis, pericarditis Drug toxicity, sepsis, burns TIMI Score 項目 1 分 Age ≥65 ✓ ≥3 ACS risk factors ✓ Use of aspirin in last 7 days ✓ Prior coronary stenosis &gt;50% ✓ ≥2 angina events in 24h or persisting ✓ ST-segment deviation ≥0.05 mV ✓ Elevated cardiac biomarkers ✓ Low risk：0-2 Intermediate risk：3-4 High risk：5-7 HEART Score 項目 分數 History Highly suspicious 2, Moderately 1, Slightly 0 ECG Significant ST-depression 2, Nonspecific 1, Normal 0 Age ≥65 = 2, 45-65 = 1, ≤45 = 0 Risk factors ≥3 = 2, 1-2 = 1, None = 0 Troponin ≥3× normal = 2, 1-3× = 1, ≤normal = 0 Low risk：0-3 High risk：≥4 Acute Coronary Syndromes (ACS) STEMI 治療 Reperfusion therapy：door-to-balloon &lt;90 min Primary PCI：首選（如有條件） Fibrinolysis：如 PCI 無法在 120 分鐘內進行 Aspirin：162-325 mg（嚼服） P2Y12 inhibitor：clopidogrel, ticagrelor, or prasugrel Anticoag：heparin or bivalirudin Beta-blocker：如無禁忌 ACE inhibitor：如有心衰竭、LVIDef &gt;40% Statin：高強度 NSTEMI / Unstable Angina 治療 Aspirin：81 mg daily P2Y12 inhibitor：如 clopidogrel Anticoag：heparin 或 enoxaparin Beta-blocker Nitroglycerin：如胸痛、高血壓 Invasive strategy：high-risk 患者 early catheterization 心因性休克 (Cardiogenic Shock) 定義 SBP &lt;90 mmHg 或需 vasopressor 維持血壓 症狀：hypotension、oliguria、altered mental status、pulmonary edema 病因 AMI（最常見，特別是 anterior STEMI） Acute mitral regurgitation（papillary muscle rupture） Ventricular septal rupture Cardiac tamponade Severe aortic stenosis End-stage cardiomyopathy 治療 Immediate：stabilize ABCs Vasopressors：norepinephrine（首選）、dopamine Inotropes：dobutamine、milrinone IABP：過去常用 Impella/TCS：目前偏好 緊急revascularization：如 AMI 導致 暈厥 (Syncope) 病因分類 類別 病因 Cardiac Arrhythmic（SVT, VT, SSS, AV block）、Structural（AS, HCM, PE, aortic dissection） Reflex Vasovagal、Situational（cough, micturition）、Carotid sinus hypersensitivity Orthostatic Volume depletion、Autonomic dysfunction、Medication-induced 高風險特徵 年老 嚴重創傷 CAD, CHF, valvular disease Abnormal ECG Heart failure 血小板減少、貧血 治療 Cardiac arrhythmia：pacemaker, ICD, ablation Structural：手術 Vasovagal：避免誘發、hydration Orthostatic：hydration、compression stockings 急性心臟衰竭 (Acute Heart Failure) 病因 Left-sided failure：肺水腫、dyspnea Right-sided failure：JVD、肝腫大、外週水腫 Cold vs. Warm： Cold：低灌流（hypotension, oliguria, altered mental） Warm：肺充血為主 治療 Oxygen：維持 SpO2 &gt;90% Diuretics：furosemide IV（初始劑量 usually 2.5× home dose） Nitroglycerin：如無低血壓 BiPAP/CPAP：如 respiratory distress Inotropes：如低血壓或休克 心臟瓣膜急症 (Valvular Emergencies) Aortic Stenosis (AS) 三元嚴重表現：Angina、Syncope、CHF 猝死風險高 治疗：球囊擴張（bridge）、手術（ definitive） 禁用：血管擴張劑（nitroglycerin、diuretics）可能致命 Mitral Regurgitation (MR) 病因：MVP、rheumatic heart disease、ischemia/AMI 急性 MR：pulmonary edema、cardiogenic shock 治療：血管擴張劑（nitroprusside）、IABP Aortic Regurgitation (AR) 症狀：dyspnea、orthopnea、PND 治療：vasodilators（nitroprusside、 ACE inhibitor） Infective Endocarditis Duke Criteria：2 major 或 1 major &#43; 3 minor 或 5 minor Major criteria： 陽性 blood culture（typical organisms × 2） 陽性 echocardiogram（vegetation, abscess） 治療：根據病原菌（Strep、S. aureus、HACEK） 瓣膜置換術後急症 Prosthetic valve thrombosis：需手術或 fibrinolysis Prosthetic valve endocarditis：高死亡率 主動脈急症 (Aortic Emergencies) Aortic Dissection 分類 類型 描述 Stanford Type A 涉及升主動脈（需手術） Stanford Type B 仅涉及降主動脈（藥物治療為主） 診斷 TEER：敏感情 98%，特異性 98% TEE：24 小時備援 CT angiography：廣泛使用 治療 目標 HR：&lt;60 bpm 目標 SBP：100-120 mmHg 藥物：IV beta-blocker（propranolol、labetalol）→ IV vasodilator（nitroprusside） 手術：Type A 保守：Type B（無併發症） Thoracic Aortic Aneurysm 定義：胸主動脈直徑 &gt;50% 大於正常（&gt;3.8 cm） 緊急手術：如有症狀、破裂、迅速擴張（&gt;1 cm/年） 心包膜急症 (Pericardial Emergencies) Pericarditis 病因：viral（最常見）、TB、uremia、malignancy、post-MI（Dressler） 診斷：friction rub、diffuse ST 上升、PR depression 治療：NSAIDs &#43; colchicine 禁忌： anticoagulation（可能血性積液） Pericardial Tamponade 病因：創傷、malignancy、uremia、dissection Beck’s triad：hypotension、JVD、muffled heart sounds 其他：pulsus paradoxus（吸氣時 SBP 下降 &gt;10 mmHg） 治療： 緊急：心包穿刺（subxiphoid approach） 不穩定：外科 repair 心律不整 (Arrhythmias) 上心室心搏過速 (SVT) 狹窄 QRS：SVT with aberrancy 寬 QRS：SVT with bundle branch block 或 VT 穩定 SVT：vagal maneuver → adenosine 6 mg → 12 mg → 12 mg 不穩定：同步電擊 心房顫動/扑動 (AF/Flutter) 控制心率：beta-blocker、diltiazem、digoxin 控制節律：cardioversion（不穩定）、antiarrhythmics 血栓預防：CHADS2-VASc score → anticoagulation 新發 AF：48 小時內 cardioversion（需 anticoagulation 或 TEE） 寬 QRS 複雜心律 類型 治療 穩定VT Amiodarone 150 mg IV → procainamide 不穩定VT/VF 同步電擊 Torsades de pointes MgSO4 1-2 g IV、停止 QT 延長藥物 心搏過緩 (Bradycardia) 藥物：atropine 0.5 mg IV（可重複，最多 3 mg） 緊急：transcutaneous pacing 穩定但有症狀：consult cardiology 重點摘要 STEMI 定義：≥1 mm ST 上升 in ≥2 contiguous leads STEMI 治療：door-to-balloon &lt;90 min、aspirin、P2Y12 inhibitor、anticoag NSTEMI：troponin 升高 &#43; clinical suspicion 心因性休克：SBP &lt;90 &#43; 组织灌流不足；norepinephrine 首選 暈厥高風險：年老、CAD、CHF、abnormal ECG 主動脈剝離：Type A（手術）、Type B（藥物）；目標 HR &lt;60, SBP 100-120 心包填塞：Beck’s triad &#43; pulsus paradoxus；心包穿刺 SVT：vagal → adenosine 6→12→12 mg Torsades：MgSO4 CHADS2-VASc：心房顫動血栓風險評估 "></div><div data-title="肺臟疾病"

                 data-content="Section 08：肺臟疾病 呼吸窘迫 (Respiratory Distress) 呼吸困難類型 類型 定義 常見原因 Dyspnea 主觀呼吸困難 多種病因 Orthopnea 躺平時呼吸困難 LV failure, diaphragmatic paralysis, COPD Paroxysmal nocturnal dyspnea 夜間躺平時發作 LV failure Platypnea 坐起時呼吸困難 腹腔壁張力喪失、patent foramen ovale Tachypnea 呼吸快速 多種病因 危及生命的呼吸困難原因 Upper airway obstruction：foreign body, angioedema, hemorrhage Tension pneumothorax Pulmonary embolism Neuromuscular weakness：myasthenia gravis, Guillain-Barré, botulism Fat embolism 呼吸衰竭前兆 顯著呼吸急促和心搏過速 Stridor 使用附屬呼吸肌肉 無法正常說話 意識障礙（缺氧或高二氧化碳） Paradoxical abdominal movement（表示橫膈膜疲勞） Heart Failure vs Pulmonary Cause 鑑別 發現 LR&#43; for HF LR- for HF S3 gallop 11.0 0.88 Pulmonary venous congestion (CXR) 12.0 0.48 Interstitial edema (CXR) 12.0 0.68 JVD 5.1 0.66 Clinical gestalt 4.4 0.45 Alveolar edema 6.0 0.95 Cardiomegaly 3.3 0.33 Wheezing 0.52 1.3 BNP 判讀 BNP &lt;100 pg/mL：排除 heart failure（低/中度風險） BNP &gt;500 pg/mL：支持 heart failure 100-500 pg/mL：不確定，需結合臨床 缺氧 (Hypoxemia) 機制 機制 A-a gradient 對氧氣治療反應 Hypoventilation 正常 改善 Right-to-left shunt 增加 無改善 V/Q mismatch 增加 改善 Diffusion impairment 增加 改善 Low inspired O2 正常 改善 正常 A-a gradient Young healthy：&lt;10 mmHg Age formula：2.5 &#43; 0.21 × age (±11) 正常值：P(a-a)O2 = 145 - PaCO2 - PaO2 治療 目標：PaO2 &gt;60 mmHg, Sao2 ≥90% 維持呼吸道通暢 補充氧氣 高二氧化碳 (Hypercapnia) 定義 Paco2 &gt;45 mmHg 只由肺泡通氣不足引起 原因 類別 原因 中樞呼吸驅動抑制 CNS結構病變、藥物（opioids, sedatives）、tetanus 胸廓疾病 Kyphoscoliosis、morbid obesity 神經肌肉疾病 Myasthenia gravis, Guillain-Barré, organophosphate, botulism 肺部疾病 COPD、upper airway obstruction 慢性 vs 急性高二氧化碳 類型 HCO3- 變化 pH 急性 &#43;1 mEq/L per 10mmHg PaCO2 降低 慢性 &#43;3.5 mEq/L per 10mmHg PaCO2 接近正常 治療 增加 minute ventilation 確保呼吸道通暢 可能需要 Non-invasive ventilation 或 mechanical ventilation 喘鳴 (Wheezing) 鑑別診斷 類別 病因 Upper airway Angioedema, foreign body, croup, epiglottitis, tracheitis Lower airway Asthma, bronchiolitis, COPD, foreign body Cardiovascular Cardiogenic pulmonary edema (“cardiac asthma”), ARDS, PE (罕見) Psychogenic - 重要區分 Wheeze：呼氣時更明顯，樂音性 Stridor：吸氣時更明顯，上呼吸                  data-content="Section 10：腎臟與泌尿系統疾病 Acute Kidney Injury (AKI) 定義 分期 標準 Stage 1 Cr 上升 1.5x 或 &gt;0.3 mg/dL in 48h；UOP &lt;0.5 mL/kg/h for 6h Stage 2 Cr 上升 2-3x；UOP &lt;0.5 mL/kg/h for 12h Stage 3 Cr 上升 &gt;3x 或 &gt;4 mg/dL；UOP &lt;0.3 mL/kg/h for 24h 或 anuria 12h 病因分類 類型 原因 比例 Prerenal 腎血流不足（脫水、心衰竭） 社區 70%、醫院 20% Intrinsic ATN、腎小球疾病、間質性腎炎 社區 20%、醫院 70% Postrenal 泌尿道阻塞 10% 病因 類別 病因 Prerenal 出血、嘔吐腹瀉、燒傷、敗血症、心衰竭、過度利尿 Intrinsic 缺血性 ATN（最常見）、藥物（NSAID、ACEI、aminoglycoside、contrast）、腎小球腎炎、間質性腎炎 Postrenal 攝護腺肥大、尿道狹窄、結石、腫瘤 風險因子 藥物：NSAID、ACEI/ARB、aminoglycosides、contrast media 系統性疾病：糖尿病、高血壓、血管炎 Outflow obstruction：prostatic/urethral disease Advanced age Heart failure Dehydration 臨床表現 Prerenal：口渴、姿勢性頭暈、尿量減少 Intrinsic：取決於病因（dark urine &#43; edema = glomerulonephritis；fever &#43; rash = interstitial nephritis） Postrenal：anuria 或 alternating oliguria/polyuria 診斷 檢查 目的 BUN/Cr 評估腎功能 Urine osmolality Prerenal &gt;500 mOsm/kg Urine Na Prerenal &lt;20 mEq/L FENa Prerenal &lt;1% CBC 感染、貧血 ECG 高血鉀症（最快速篩檢） ** Renal ultrasound** 排除 obstruction 治療 Prerenal：補充體液、糾正低血壓 Intrinsic：移除 nephrotoxins、治療 underlying cause Postrenal：解除阻塞 高血鉀：calcium gluconate、insulin &#43; glucose、sodium bicarbonate、kayexalate、dialysis Volume overload：loop diuretics、dialysis Rhabdomyolysis 病因 擠壓傷（最典型） 過度運動 熱衰竭/中暑 藥物（statin、cocaine） 甲狀腺功能減退 診斷 症狀：肌肉疼痛、無力、深色尿 CK：&gt;5x normal（確診） Urine dipstick：blood positive 但無 RBC（myoglobin） 電解質異常：高血鉀、高血磷、低血鈣 治療 大量靜脈輸液（最重要） 目標：維持 UOP 200-300 mL/h 避免：LR（高鉀風險） 電解質監測 必要時透析 Urinary Tract Infections (UTI) 診斷 族群 診斷標準 女性 Dysuria &#43; frequency &#43; Pyuria（&gt;10 WBC/hpf）或 Bacteria（&gt;10⁵ CFU/mL） 男性 任何 UTI 都是複雜性，需進一步評估 兒童 UTI 是發燒原因，需積極評估 治療 類型 抗生素 Cystitis Nitrofurantoin 5-7d、TMP-SMX 3d、Fosfomycin 單劑量 Pyelonephritis Fluoroquinolone 7-14d、cephalosporin 併發症 腎膿痬：需住院 IV antibiotics Emphysematous pyelonephritis：糖尿病患者，緊急處理 Urolithiasis (腎結石) 臨床表現 疼痛：severe colicky flank pain → groin 血尿（macro- 或 micro-） 噁心嘔吐 位置與輻射 結石位置 疼痛位置 Ureteropelvic junction 腰部 Upper ureter 腰部、睪丸/陰唇 Mid ureter 下腹部、鼠蹊 Distal ureter 鼠蹊、睪丸/陰唇 Stone at UVJ 陰莖/陰唇 診斷 CT without contrast：首選（敏感度 95-100%） 超聲：可用於孕婦、孩童 KUB X-ray：僅對 calcium-containing stones 敏感 治療 結石大小 處理 &lt;5 mm 90% 自發排出（保守治療） 5-10 mm 可能的自發排出 &gt;10 mm 需積極處理（ESWL、PCNL、ureteroscopy） 疼痛控制 NSAID（首選）：ketorolac IV Opioid：如 NSAID 不足 結石預防 Calcium stones：正常 calcium 飲食、low sodium、high fluid Uric acid stones：urine alkalinization Oxalate stones：low oxalate diet Male Genitourinary Emergencies Priapism 定義：持續勃起 &gt;4 小時，與性刺激無關 Ischemic（low-flow）：緊急處理 Non-ischemic（high-flow）：通常創傷後 治療 Ischemic： 抽吸血液 Phenylephrine 注射 如失敗：surgical shunt Non-ischemic：觀察、angiographic embolization Testicular Torsion 高峰期：新生兒、青少年 症狀：突然嚴重睪丸痛、噁心嘔吐 理學：high-riding testis、lateral deviation、absent cremasteric reflex 診斷：臨床懷疑即手術（無法等待 imaging） Doppler ultrasound：如有疑義 治療 &lt;6 小時：睪丸固定術（orchiopexy） &gt;6 小時：可能需要睪丸切除術（orchiectomy） Epididymitis/Epididymo-orchitis &lt;35 歲： STI 病原（Neisseria、Chlamydia） &gt;35 歲：Gram-negative rods（大腸桿菌） 症狀：漸進性疼痛、發燒、尿道分泌物 理學：Prehn’s sign（&#43;）（抬高疼痛緩解） 治療： &lt;35：Ceftriaxone &#43; Doxycycline 35：Ciprofloxacin

                 data-content="Section 13：傳染病 (Infectious Diseases) Sexually Transmitted Infections (STIs) 一般原則 診斷要點：
病史需包含 sexual history（非judgemental 方式） Five Ps：Partners、Pregnancy prevention、Protection、Practices、Past history 多重感染常見（確診一個 STI 時應篩檢其他） 所有生育年齡女性需做 pregnancy test 治療原則：
疑似 gonorrhea/chlamydia → ED single-dose therapy 孕婦需 consultation 報告義務：Chlamydia、Gonorrhea、HIV、Syphilis 伴侣治療（最後一次性接觸前 60 天內） 建議 7-14 天後追蹤 Chlamydia trachomatis 臨床特徵：
美國最常見 STI 女性常無症狀 男性：urethritis、epididymitis、proctitis、Reiter’s syndrome 女性：asymptomatic cervicitis、vaginal discharge、intermenstrual bleeding、dysuria 診斷：
NAAT：sensitivity 90%、specificity 99% 可使用 urine 或 vaginal specimens 治療：
藥物 劑量 Azithromycin 1g PO single dose Doxycycline 100mg PO bid × 7 days 孕婦 Azithromycin 或 amoxicillin Neisseria gonorrhoeae 臨床特徵：
女性 80-90% 無症狀 男性 80-90% 有症狀（2 週內） 男性：dysuria &#43; purulent penile discharge 女性：nonspecific lower abdominal discomfort &#43; mucopurulent cervicitis Disseminated gonococcemia：petechial/pustular acral lesions、asymmetric arthralgias、tenosynovitis 診斷：
NAAT（cervical、vaginal、urethral、urine） 男性：Gram stain（intracellular diplococci &#43; PMNs）可確診 治療：
Dual therapy 建議（因 resistance）： Ceftriaxone 250mg IM &#43; Azithromycin 1g PO 或 Cefixime 400mg PO &#43; Azithromycin 1g PO Fluoroquinolones：不再建議（resistance） 孕婦：ceftriaxone 或 azithromycin 2g PO Disseminated：Ceftriaxone 1g IV/IM q24h × 1-2 days → oral × 1 week Nongonococcal Urethritis 原因：
C. trachomatis（最常見） U. urealyticum M. genitalium T. vaginalis HSV、adenovirus 診斷：
Urethral specimen ≥5 WBCs/oil immersion field First-void urine 異常 治療：
同 chlamydia 如果持續 → T. vaginalis 治療（metronidazole 2g single dose） Trichomonas vaginalis 臨床特徵：
Incubation：3-28 days 症狀：vulvar irritation、malodorous thin discharge、burning、pruritus、dysuria 男性通常無症狀 經期症狀可能加劇 診斷：
Wet mount：motile parasites Culture（最準確但需 7 天） DNA probes/monoclonal antibodies 治療：
藥物 劑量 Metronidazole 2g PO single dose 或 500mg bid × 7d Tinidazole 2g PO single dose 孕婦 Metronidazole 2g single dose（僅有症狀時） 注意： 服藥期間避免酒精
Genital Ulcers 比較 疾病 病灶特徵 疼痛 淋巴結 Syphilis Indurated、clean base、painless 無 Firm、rubbery、nontender HSV Multiple vesicles → shallow ulcers 有 Tender bilateral Chancroid Painful、purulent、irregular 有 50% suppurative buboes LGV Small shallow ulcer 無 Tender Granuloma inguinale Painless、beefy red、bleeding 無 無 Syphilis (Treponema pallidum) 臨床分期：
分期 表現 Primary Painless chancre（3-6 週自行癒合）、incubation ~21 days Secondary Rash（trunk、flexor surfaces、palms、soles）、lymphadenopathy、fever、sore throat Tertiary/Latent 3-20 年後：meningitis、dementia、tabes dorsalis、thoracic aneurysm 診斷：
Darkfield microscopy：直接看到 spirochete Nontreponemal tests（VDRL、RPR）：screening &#43; monitor treatment response Treponemal tests（FTA-ABS）：confirmatory 需兩者配合確診 治療：
分期 治療 Primary/Secondary/Early latent Benzathine penicillin G 2.4M units IM single dose Latent/Late Benzathine penicillin G 2.4M units IM weekly × 3 weeks Penicillin allergy（非孕婦） Doxycycline 100mg bid × 14 days Jarisch-Herxheimer reaction： 治療後 24 小時內發生的急性發燒反應（常見於早期治療）
Herpes Simplex Virus (HSV) 臨床特徵：
終身感染（HSV-1、HSV-2） 25% 美國人口有 serologic evidence Primary outbreak：prodrome（tingling、burning）→ vesicles → erosions → crusting 恢復通常 3 週內 Recurrent outbreaks 較輕微 診斷：
臨床診斷為主 Tzanck test：大 intranuclear inclusions Culture 或 PCR（vesicle fluid &#43; base swab） 治療：
類型 藥物/劑量 First episode Acyclovir 400mg tid × 7-10d 或 famciclovir 250mg tid × 7-10d 或 valacyclovir 1g bid × 7-10d Recurrent（&lt;9 episodes/年） Valacyclovir 1g daily × 5d Suppressive（&gt;9 episodes/年） Valacyclovir 500mg daily Severe/Immunocompromised Acyclovir 5-10mg/kg IV q8h × 2-7d → oral 孕婦 Acyclovir 400mg tid × 7-10d Chancroid (Haemophilus ducreyi) 臨床特徵：
Painful erythematous papule → erosion/pustule incubation：4-10 days Ulcers：sharp undermined margins、yellow-gray necrotic base “Kissing lesions”（autoinoculation） 50% painful suppurative lymphadenopathy 診斷：
臨床診斷（painful ulcer &#43; lymphadenopathy） Culture（需要特殊培養基，sensitivity &lt;80%） 治療：
藥物 劑量 Azithromycin 1g PO single dose Ceftriaxone 250mg IM single dose Ciprofloxacin 500mg bid × 3d Erythromycin 500mg qid × 7d Lymphogranuloma Venereum (LGV) 原因： Chlamydia trachomatis L1、L2、L3
臨床特徵：
Primary：painless chancre（很少被注意到） 1-3 週後：painful lymphadenopathy（buboes） 可能併發 proctocolitis、fistulas、strictures 治療：
Doxycycline 100mg bid × 21 days 孕婦：erythromycin 500mg qid × 21 days Granuloma Inguinale (Donovanosis) 原因： Klebsiella granulomatis
臨床特徵：
Endemic：Africa、Australia、India、New Guinea 美國罕見 Painless、beefy red、bleeding ulcers 無淋巴結病變 治療：

                 data-content="Section 16：環境傷害 (Environmental Injuries) Cold Injuries 非凍結性冷傷害 Trench Foot：
長時間暴露於潮濕、低溫（&gt;0°C） 早期：tingling、numbness、pale、mottled、pulseless 後期：hyperemic phase、burning pain、edema、bullae 治療：supportive、keep clean/warm/dry/elevated Chilblains (Pernio)：
長期間歇性暴露於潮濕、非凍結溫度 部位：feet、hands、ears、lower legs 表現：erythema、cyanosis、edema、pruritus、burning 治療：rewarm、nifedipine 20mg tid、topical corticosteroids Cold Urticaria：
對冷空氣/水的過敏反應 可導致致命 anaphylaxis 治療：antihistamines (H1)、epinephrine autoinjector（如果有 anaphylaxis 歷史） Frostbite (凍結性傷害) 分級 Degree 臨床表現 First degree (frostnip) Numbness、erythema、mild edema、desquamation Second degree Full-thickness skin freezing、clear blisters、substantial edema Third degree Hemorrhagic blisters、skin necrosis、blue-gray discoloration Fourth degree 深層組織受損（muscle、bone、tendon）、mummified eschar 風險因素 類別 因素 環境 溫度、風速、濕度、海拔 個人 Age、gender、alcohol、smoking、clothing 健康 Raynaud’s、diabetes、peripheral vascular disease、previous cold injury 病理生理 Endothelial damage → arachidonic acid cascade → vasoconstriction → thrombosis → ischemia/necrosis 組織分區：zone of coagulation（不可逆）、zone of stasis（可能可逆）、zone of hyperemia（恢復良好） 治療 Field care：
移除濕/緊身衣物 覆蓋乾衣物 不要 rewarm 直到避免 refreezing 給止痛藥 ED management：
Rapid rewarming：水溫 37-39°C，20-30 分鐘直到組織軟化、發紅 Parenteral opiates（rewarming 很痛） Topical aloe vera q6h（對抗 arachidonic acid cascade） Ibuprofen 12 mg/kg/day divided doses Blister management：
Clear blisters：有爭議；blister fluid 含 thromboxane/prostaglandins Hemorrhagic blisters：不要 debride Optional：
Topical bacitracin 或 penicillin G 500,000U IV q6h × 48-72h Tetanus prophylaxis 不建議：
Early surgery（需要數週才能判斷組織存活） Heparin（無明確效益） Early sympathectomy Hypothermia 定義 Accidental hypothermia：core temperature &lt;35°C (&lt;95°F) 分為 primary（單純環境暴露）和 secondary（散熱增加或產熱減少） 分期 Stage 臨床表現 溫度 治療 HT I (Mild) Conscious、shivering 35-32°C Warm environment、clothing、drinks HT II (Moderate) Impaired consciousness &lt;32-28°C Active external rewarming、cardiac monitoring HT III (Severe) Unconscious、vital signs present &lt;28°C HT II &#43; airway management、consider ECMO/CPB HT IV Vital signs absent - CPR、transport to ECMO/CPB center 生理變化 系統 變化 CNS Impaired judgment → ataxia → unconscious → areflexia CV Initial tachycardia → bradycardia、hypotension、arrhythmias Resp Tachypnea → hypoventilation → respiratory arrest Renal Cold diuresis（vasoconstriction-induced hypervolemia） Coag Coagulopathy（&lt;34°C）、hypercoagulable（部分患者） ECG 變化 Osborn J waves：經典變化，通常 &lt;32°C 可出現任何心律不整 Atrial fibrillation/flutter 是預期中的，不是立即治療的適應症 治療原則 Mild hypothermia (HT I)：
Warm environment Warm drinks Active movement Moderate/Severe (HT II-III)：
Active external rewarming：warm blankets、forced-air warming Warm IV fluids Cardiac monitoring Minimal movements（避免 arrhythmia） HT IV / Cardiac arrest：
CPR Epinephrine（可用，但 metabolism 慢） Transport to ECMO/CPB center（如果可用） Consider ECMO/CPB for cardiac instability refractory to medical management ECMO/CPB 適應症：
HT III with cardiac instability HT IV Cannot tolerate low cardiac output 特殊考量 “Rescue collapse”：
在 extrication/transport/treatment 時可能發生 cardiac arrest 原因：cold myocardium irritability “Afterdrop”：
離開冷環境後 core temperature 可能繼續下降 健康能 shiver 的患者通常能 self-rewarm Iatrogenic hypothermia：
常見於創傷患者 可導致 coagulopathy 和 mortality 增加 使用 fluid warmers 和保溫 Electrical Injuries 病理生理 效應 說明 Direct tissue damage 電流通過組織的熱效應 Muscle contraction 可導致骨折、關節脫臼 Cardiac VF、asystole、arrhythmias 血管 Vasospasm、thrombosis 神經 Paralysis、paresthesias 臨床表現 系統 表現 Skin Burns（entry/exit points）、thermal burns Cardiac Arrhythmias、MI 神經 Paralysis、paresthesias、SCI ** Renal** Myoglobinuria（rhabdomyolysis） 治療 治療 說明 BLS/ACLS VF → defibrillation Fluid resuscitation 根據燒傷面積計算（Parkland formula） Tetanus prophylaxis Monitor ECG 24h（如果有任何心臟症狀） Lightning Injuries 臨床特徵 表現 說明 Cardiac Immediate cardiac arrest（asystole 或 VF） Neurologic LOC、paralysis、SCI ** cutaneous** Burns、fern-like patterns（Lichtenberg figures） Auditory Tympanic membrane rupture 治療 BLS/ACLS Tympanic membrane rupture：是預期中的（不是排除標準） Admission：所有 lightning strike 患者 Diving Emergencies Decompression Illness (DCI) 原因： 氮氣在減壓時形成氣泡
類型：
類型 表現 DCS Type I Joint pain、skin manifestations、lymphedema DCS Type II 神經、心臟、肺部症狀 AGE Cerebral ischemia、spinal cord injury 治療 治療 說明 100% O2 減少氮氣負荷 IV fluids - Recompression 必需；consult diving medicine Transport 盡快送到 recompression chamber 減壓錶/飛航 送出後 24 小時內避免飛航 如果需要飛航，使用 100% O2 在飛機上 高山症 (Altitude Illness) 急性高山症 (AMS) 症狀 說明 頭痛 典型的 GI Nausea、vomiting、anorexia CNS Fatigue、dizziness、sleep disturbance 高山腦水腫 (HACE) 嚴重的 AMS &#43; altered mental status、ataxia 可能致命 高山肺水腫 (HAPE) 非心因性 pulmonary edema 症狀：dyspnea、cough、pink frothy sputum 治療 疾病 治療 AMS Descend、acetazolamide、oxygen HACE Immediate descent、dexamethasone HAPE Immediate descent、nifedipine、oxygen、portable hyperbaric chamber 預防 Acetazolamide 125-250mg bid Dexamethasone 2mg q6h 或 4mg q12h Altitude acclimatization：慢慢上升 輻射傷害 急性輻射症候群 (ARS) 階段 時間 表現 Prodromal Hours Nausea、vomiting、diarrhea Latent Days-weeks Asymptomatic Manifest 取決於劑量 Bone marrow（pancytopenia）、GI（bleeding、dehydration）、CV/CNS（death） 治療 治療 說明 Supportive Fluid、electrolytes、transfusions Filgrastim (G-CSF) Bone marrow suppression Prophylaxis Antibiotics、antifungals Decontamination 如果有 external contamination Decorporation agents 藥物 用途 Prussian blue Cesium、thallium DTPA (Ca-DTPA 或 Zn-DTPA) Plutonium、americium、curium Sodium bicarbonate Uranium "></div><div data-title="內分泌疾病"

<script>
document.addEventListener("DOMContentLoaded", function () {
    const searchInput = document.getElementById("search-input");
    const searchResults = document.getElementById("search-results");
    const dbElements = document.querySelectorAll("#search-database div");

    const searchData = Array.from(dbElements).map(el => ({
        title: el.getAttribute("data-title"),
        permalink: el.getAttribute("data-permalink"),
        content: el.getAttribute("data-content").toLowerCase()
    }));

    if (!searchInput) return;

    searchInput.addEventListener("input", function (e) {
        const query = e.target.value.toLowerCase().trim();
        searchResults.innerHTML = "";

        if (query === "") return;

        const matches = searchData.filter(item => 
            item.title.toLowerCase().includes(query) || 
            item.content.includes(query)
        );

        if (matches.length === 0) {
            searchResults.innerHTML = '<p style="color: #999; text-align: center; margin-top: 2rem;">找不到相關筆記</p>';
            return;
        }

        matches.forEach(item => {
            const a = document.createElement("a");
            a.href = item.permalink;
            a.className = "search-result-item";
            a.innerHTML = "📖 " + item.title;
            searchResults.appendChild(a);
        });
    });
});
</script>

                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
<script>
    var toplink = document.getElementById("top-link");
    window.onscroll = function () {
        const scrollThreshold = window.innerHeight;
        if (document.body.scrollTop > scrollThreshold || document.documentElement.scrollTop > scrollThreshold) {
            toplink.classList.remove("hidden");
        } else {
            toplink.classList.add("hidden");
        }
    };

</script>
<script>
    document.getElementById("theme-toggle").addEventListener("click", () => {
        const html = document.querySelector("html");
        if (html.dataset.theme === "dark") {
            html.dataset.theme = 'light';
            localStorage.setItem("pref-theme", 'light');
        } else {
            html.dataset.theme = 'dark';
            localStorage.setItem("pref-theme", 'dark');
        }
    })

</script>
</body>
